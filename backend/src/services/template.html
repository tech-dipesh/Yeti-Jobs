<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background-color: #1a1a1a; margin: 0; padding: 40px; font-family: Arial, sans-serif;">
  <p style="color: #ccc; text-align: center; font-size: 18px;">Email Verification:</p>
  <div
    style="background-color: #1f1f1f; border: 1px solid #444; border-radius: 12px; padding: 24px; max-width: 580px; margin: 0 auto;">
    <div style="background-color: #2e2e2e; border-radius: 10px; padding: 40px 32px; text-align: center;">
      <img src="https://raw.githubusercontent.com/tech-dipesh/Online-Server-Assets/refs/heads/main/logo-rounded.png?token=GHSAT0AAAAAADO6AAS3ZS44A25J23A6QKHK2N7TWJQ" alt="logo" height="52px" width="52px">
      <p style="color: #ccc; font-size: 14px; text-align: left; margin: 0 0 4px;">Hi {{name}},</p>
      <p style="color: #ccc; font-size: 14px; text-align: left; margin: 0 0 24px;">Use a Below Code To {{type}}
        :</p>
      <div
        style="background-color: #2563eb; border-radius: 8px; padding: 14px 32px; display: inline-block; color: #fff; font-size: 24px; letter-spacing: 6px; font-weight: bold; width: 60%; text-align: center;">  
        {{otp}}
      </div>
      <p style="color: #ccc; font-size: 14px; margin: 24px 0 6px;">Remember: This Code Will Expired In 15 Minutes</p>
      <p style="color: #888; font-size: 11px; margin: 0;">If You Didn't try for {{belowmethod}}, You Can Ignore Message</p>
    </div>
  </div>

</body>

</html>
