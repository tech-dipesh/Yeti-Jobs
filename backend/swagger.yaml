      description: ""
      required: true

    login:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/login"
      description: ""
      required: true

    request_forget_password:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/request_forget_password"
      description: ""
      required: true

    signup:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/signup"
      description: ""
      required: true

    skills_add:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/skills_add"
      description: ""
      required: true

    update_user:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/update_user"
      description: ""
      required: true

    verify_code:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/verify_code"
      description: ""
      required: true

    verify_forget_password:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/verify_forget_password"
      description: ""
      required: true

    profile_picture:
      content:
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/profile_picture"
      description: ""
      required: true

    upload_resume:
      content:
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/upload_resume"
      description: ""
      required: true

