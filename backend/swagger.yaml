components:
  schemas:
    assign_company_user:
      type: object
      properties:
        company_id:
          type: string
        uid:
          type: string

    search_users:
      type: object
      properties:
        company_id:
          type: string
        uid:
          type: string

    add_new_company:
      type: object
      properties:
        name:
          type: string
        descriptions:
          type: string
        company_logo:
          type: array
          items:
            type: string
          properties:
            "0":
              type: string
        website:
          type: string
        location:
          type: string
        founded_year:
          type: string

    update_company_list:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        website:
          type: string
        location:
          type: string
        founded_year:
          type: number

    apply_to_the_job:
      type: object
      properties:
        cover_letter:
          type: string
        notice_period:
          type: number
        why_hire:
          type: string
        expected_salary:
          type: number

    change_applicant_status:
      type: object
      properties:
        status:
          type: string
        user_id:
          type: string

    create_new_job:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        job_type:
          type: string
        salary:
          type: number
        skills:
          type: array
          items:
            type: string
          properties:
            "0":
              type: string
            "1":
              type: string

    update_existing_jobs:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        job_type:
          type: string
        salary:
          type: number
        company_name:
          type: string
        experience_years:
          type: number
        skills:
          type: array
          items:
            type: string

    edit_user_info:
      type: object
      properties:
        fname:
          type: string
        lname:
          type: string
        education:
          type: string
        email:
          type: string

    login:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    request_forget_password:
      type: object
      properties:
        email:
          type: string

    signup:
      type: object
      properties:
        fname:
          type: string
        lname:
          type: string
        password:
          type: string
        education:
          type: string
        email:
          type: string

    skills_add:
      type: object
      properties:
        skills:
          type: array
          items:
            type: string

    update_user:
      type: object
      properties:
        fname:
          type: string
        lname:
          type: string
        education:
          type: string
        email:
          type: string

    verify_code:
      type: object
      properties:
        code:
          type: number

    verify_forget_password:
      type: object
      properties:
        code:
          type: number
        email:
          type: string
        newpassword:
          type: string

    profile_picture:
      type: object
      properties:
        profile:
          type: string
          format: binary

    upload_resume:
      type: object
      properties:
        resume:
          type: array
          items:
            type: string
          properties:
            "0":
              type: string

  requestBodies:
    assign_company_user:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/assign_company_user"
      description: ""
      required: true

    search_users:
      content:
        application/json:
